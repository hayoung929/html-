<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로미스나인</title>
  <style>
    li { color: greenyellow; }
    ins { font-weight: bold; }
    .HJ { font-size: 50px; }
    #stu { font-size: 40px; }
  </style>
</head>
<body>
  <h3>프로미스나인</h3>
  <div>
    <div>송하영 <strong id="stu">박지원</strong></div>
    <ul>
      <li class="HJ">이나경</li>
      <li><ins>이채영</ins></li>
      <li>백지헌</li>
    </ul>
    <div>프로미스나인 송하영</div>
  </div>
</body>
</html>
</html>
